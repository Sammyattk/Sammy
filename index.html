<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Open-Meteo</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
}
input, button {
  padding: 10px;
  margin: 5px;
}
#resultado {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>🌦️ Teste Clima (Open-Meteo)</h1>

<input id="cidade" placeholder="Digite cidade do PR (ex: Curitiba)">
<br>
<button onclick="buscarClima()">Buscar Clima</button>

<div id="resultado"></div>

<script>

// 🔥 coordenadas das cidades do Paraná
const cidades = {
  "curitiba": { lat: -25.42, lon: -49.27 },
  "londrina": { lat: -23.31, lon: -51.16 },
  "maringa": { lat: -23.42, lon: -51.93 },
  "cascavel": { lat: -24.96, lon: -53.46 }
};

async function buscarClima() {

  const input = document.getElementById("cidade").value.toLowerCase();
  const resBox = document.getElementById("resultado");

  if (!cidades[input]) {
    resBox.innerHTML = "Cidade não cadastrada (use Curitiba, Londrina, Maringá ou Cascavel)";
    return;
  }

  const { lat, lon } = cidades[input];

  resBox.innerHTML = "Carregando...";

  try {
    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );

    const data = await res.json();
    const clima = data.current_weather;

    resBox.innerHTML = `
      📍 Cidade: ${input} <br><br>
      🌡️ Temperatura: ${clima.temperature}°C <br>
      💨 Vento: ${clima.windspeed} km/h <br>
      🧭 Direção do vento: ${clima.winddirection}° <br>
      🕒 Horário: ${clima.time}
    `;

  } catch (erro) {
    resBox.innerHTML = "Erro ao buscar clima";
    console.error(erro);
  }
}

</script>

</body>
</html>
