<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste API HG</title>
</head>

<body>

<h2>Teste API Clima</h2>

<input id="cidade" placeholder="Ex: Curitiba">
<button onclick="testar()">Testar</button>

<pre id="resposta"></pre>

<script>
async function testar() {
  const cidade = document.getElementById("cidade").value;
  const box = document.getElementById("resposta");

  if (!cidade) {
    box.innerText = "Digite uma cidade";
    return;
  }

  try {
    const url = new URL("https://api.hgbrasil.com/weather");

    url.searchParams.set("key", "eaef0af3");
    url.searchParams.set("city_name", cidade + ",PR");

    const res = await fetch(url.href);
    const data = await res.json();

    // 🔥 MOSTRA O JSON COMPLETO (SEM FILTRO)
    box.innerText = JSON.stringify(data, null, 2);

  } catch (erro) {
    box.innerText = "Erro: " + erro;
  }
}
</script>

</body>
</html>
